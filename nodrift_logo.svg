<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 32" width="150" height="44">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@500;700&amp;display=swap');
    text {
      font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 26px;
    }
    .no { fill: #007aff; font-weight: 500; }
    .drift { fill: #c9d1d9; font-weight: 700; }
    .cursor { fill: #007aff; }
    
    @media (prefers-color-scheme: light) {
      .drift { fill: #24292f; }
      .no { fill: #007aff; }
      .cursor { fill: #007aff; }
    }
    @media (prefers-color-scheme: dark) {
      .drift { fill: #c9d1d9; }
      .no { fill: #0a84ff; }
      .cursor { fill: #0a84ff; }
    }
  </style>
  <text x="2" y="24">
    <tspan class="no">no</tspan><tspan class="drift">drift</tspan>
  </text>
  <rect x="85" y="21" width="9" height="3" class="cursor"/>
</svg>
